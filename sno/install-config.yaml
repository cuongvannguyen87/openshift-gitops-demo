apiVersion: v1
baseDomain: aws.ocp.internal
metadata:
  name: sno415

publish: Internal

platform:
  aws:
    region: ap-southeast-1
    subnets:
      - <PRIVATE_SNO_SUBNET_ID>
    hostedZone: <PRIVATE_HOSTED_ZONE_ID>

controlPlane:
  name: master
  replicas: 1
  platform:
    aws:
      type: m6i.2xlarge
      rootVolume:
        size: 120

compute:
  - name: worker
    replicas: 0

networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.10.0.0/16
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16

pullSecret: '<YOUR_PULL_SECRET_JSON_ON_ONE_LINE>'
sshKey: '<YOUR_BASTION_PUBLIC_KEY>'
